

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  .app {
    font-family: var(--font-sans), 'Inter', sans-serif;
    padding: 2rem 1.5rem 3rem;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.12;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 400px; height: 400px; background: #7F77DD; top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 350px; height: 350px; background: #1D9E75; bottom: -80px; right: -80px; animation-delay: 3s; }
  .orb3 { width: 250px; height: 250px; background: #D4537E; top: 40%; left: 50%; animation-delay: 6s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(30px, -40px) scale(1.08); }
  }

  .content { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 2.5rem; }
  .header-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, #7F77DD22, #1D9E7522);
    border: 0.5px solid var(--color-border-secondary);
    font-size: 26px; margin-bottom: 1rem;
    animation: pulse-soft 3s ease-in-out infinite;
  }
  @keyframes pulse-soft {
    0%, 100% { box-shadow: 0 0 0 0 #7F77DD33; }
    50% { box-shadow: 0 0 0 8px transparent; }
  }
  .title {
    font-size: 22px; font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 0.4rem;
  }
  .subtitle { font-size: 14px; color: var(--color-text-secondary); }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--color-border-secondary); }

  .input-row {
    display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
  }

  .input-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
  .input-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }

  input[type="date"] {
    padding: 9px 12px; font-size: 15px; width: 100%;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="date"]:focus {
    border-color: #7F77DD;
    box-shadow: 0 0 0 3px #7F77DD22;
  }

  .btn-generate {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 20px; font-size: 15px; font-weight: 500;
    border-radius: var(--border-radius-md);
    border: 0.5px solid #534AB7;
    background: linear-gradient(135deg, #7F77DD, #534AB7);
    color: #fff; cursor: pointer; white-space: nowrap;
    transition: opacity 0.15s, transform 0.12s;
  }
  .btn-generate:hover { opacity: 0.92; }
  .btn-generate:active { transform: scale(0.97); }
  .btn-generate i { font-size: 16px; }

  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .results-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .badge-count {
    font-size: 12px; font-weight: 500; padding: 2px 10px;
    border-radius: 999px;
    background: var(--color-background-info);
    color: var(--color-text-info);
  }

  .timeline { position: relative; padding-left: 28px; }
  .timeline::before {
    content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 1px;
    background: linear-gradient(to bottom, #7F77DD55, #1D9E7533, transparent);
  }

  .review-item {
    position: relative; margin-bottom: 10px;
    animation: slide-in 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .review-item::before {
    content: ''; position: absolute; left: -22px; top: 50%;
    transform: translateY(-50%);
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--dot-color, #888780);
    border: 2px solid var(--color-background-primary);
    transition: transform 0.2s;
  }
  .review-item:hover::before { transform: translateY(-50%) scale(1.3); }

  .review-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    transition: border-color 0.2s, background 0.2s;
  }
  .review-card:hover {
    border-color: var(--color-border-secondary);
    background: var(--color-background-primary);
  }

  .review-left { display: flex; align-items: center; gap: 10px; }
  .day-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 52px; height: 24px; padding: 0 8px;
    border-radius: 999px;
    font-size: 11px; font-weight: 500; white-space: nowrap;
  }
  .review-desc { font-size: 13px; color: var(--color-text-secondary); }

  .review-date {
    font-size: 14px; font-weight: 500;
    color: var(--color-text-primary); letter-spacing: 0.01em;
  }

  .today-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 500;
    padding: 2px 8px; border-radius: 999px;
    background: #0F6E5622; color: #0F6E56;
    border: 0.5px solid #1D9E7544;
    margin-left: 8px;
  }

  .empty-state {
    text-align: center; padding: 3rem 1rem;
    color: var(--color-text-tertiary);
  }
  .empty-icon { font-size: 40px; margin-bottom: 0.75rem; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  .progress-bar {
    height: 3px; border-radius: 2px; overflow: hidden;
    background: var(--color-border-tertiary); margin-top: 0.75rem;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #7F77DD, #1D9E75);
    width: 0%; transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
  }

  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-top: 1rem;
  }
  .stat-box {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 0.75rem 1rem; text-align: center;
  }
  .stat-value { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .stat-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
</style>

<h2 class="sr-only">Spaced Repetition Review Schedule Generator</h2>

<div class="app">
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="content">
    <div class="header">
      <div class="header-icon" aria-hidden="true">🧠</div>
      <h1 class="title">Spaced Repetition</h1>
      <p class="subtitle">Generate your optimal review schedule</p>
    </div>

    <div class="card">
      <div class="input-row">
        <div class="input-group">
          <label class="input-label" for="startDate">Learning date</label>
          <input type="date" id="startDate">
        </div>
        <button class="btn-generate" onclick="generateDates()" aria-label="Generate schedule">
          <i class="ti ti-sparkles" aria-hidden="true"></i>
          Generate
        </button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div id="resultsSection" style="display:none">
      <div class="card">
        <div class="results-header">
          <span class="results-title">Review schedule</span>
          <span class="badge-count" id="badgeCount">8 sessions</span>
        </div>
        <div class="timeline" id="result"></div>
      </div>

      <div class="stats-row" id="statsRow"></div>
    </div>

    <div id="emptyState" class="card empty-state">
      <div class="empty-icon" aria-hidden="true">📅</div>
      <p class="empty-text">Pick a learning date and hit Generate<br>to see your memory review timeline</p>
    </div>
  </div>
</div>

<script>
const INTERVALS = [
  { days: 0,  label: 'Today',     color: '#1D9E75', bg: '#E1F5EE', desc: 'First encounter' },
  { days: 1,  label: '+1 day',    color: '#1D9E75', bg: '#E1F5EE', desc: 'Next day review' },
  { days: 2,  label: '+2 days',   color: '#0F6E56', bg: '#9FE1CB', desc: 'Consolidation' },
  { days: 4,  label: '+4 days',   color: '#534AB7', bg: '#EEEDFE', desc: 'Deepening' },
  { days: 7,  label: '+1 week',   color: '#534AB7', bg: '#EEEDFE', desc: 'Weekly recall' },
  { days: 14, label: '+2 weeks',  color: '#3C3489', bg: '#AFA9EC', desc: 'Bi-weekly boost' },
  { days: 30, label: '+1 month',  color: '#D85A30', bg: '#FAECE7', desc: 'Monthly check' },
  { days: 60, label: '+2 months', color: '#993C1D', bg: '#F5C4B3', desc: 'Long-term lock' },
];

function formatDate(d) {
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return dd + '/' + mm + '/' + yyyy;
}

function isToday(d) {
  const t = new Date();
  return d.getDate() === t.getDate() &&
    d.getMonth() === t.getMonth() &&
    d.getFullYear() === t.getFullYear();
}

function generateDates() {
  const dateInput = document.getElementById('startDate').value;
  if (!dateInput) {
    document.getElementById('startDate').focus();
    return;
  }

  const startDate = new Date(dateInput + 'T00:00:00');
  const result = document.getElementById('result');
  result.innerHTML = '';

  INTERVALS.forEach((item, idx) => {
    const reviewDate = new Date(startDate);
    reviewDate.setDate(reviewDate.getDate() + item.days);
    const todayFlag = isToday(reviewDate);

    const el = document.createElement('div');
    el.className = 'review-item';
    el.style.setProperty('--dot-color', item.color);
    el.style.animationDelay = (idx * 0.05) + 's';

    el.innerHTML = `
      <div class="review-card">
        <div class="review-left">
          <span class="day-badge" style="background:${item.bg};color:${item.color}">${item.label}</span>
          <span class="review-desc">${item.desc}</span>
          ${todayFlag ? '<span class="today-tag"><i class="ti ti-circle-check" style="font-size:10px" aria-hidden="true"></i>Today</span>' : ''}
        </div>
        <span class="review-date">${formatDate(reviewDate)}</span>
      </div>
    `;
    result.appendChild(el);
  });

  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';

  const fill = document.getElementById('progressFill');
  fill.style.width = '0%';
  setTimeout(() => { fill.style.width = '100%'; }, 50);

  const endDate = new Date(startDate);
  endDate.setDate(endDate.getDate() + 60);
  const today = new Date();
  const totalMs = endDate - startDate;
  const elapsedMs = today - startDate;
  const pct = Math.max(0, Math.min(100, Math.round(elapsedMs / totalMs * 100)));

  const statsRow = document.getElementById('statsRow');
  statsRow.innerHTML = `
    <div class="stat-box">
      <div class="stat-value">8</div>
      <div class="stat-label">Review sessions</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">60</div>
      <div class="stat-label">Days total span</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${pct}%</div>
      <div class="stat-label">Journey complete</div>
    </div>
  `;
}

const today = new Date();
const pad = n => String(n).padStart(2, '0');
document.getElementById('startDate').value =
  today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());
</script>
