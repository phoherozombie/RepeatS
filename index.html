<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaced Repetition Date Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 10px;
            font-size: 16px;
        }

        button {
            cursor: pointer;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 8px 0;
        }

        .today {
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<h1>Spaced Repetition Generator</h1>

<div class="container">
    <input type="date" id="startDate">

    <button onclick="generateDates()">Generate</button>
</div>

<h3>Review Schedule</h3>
<ul id="result"></ul>

<script>
function generateDates() {

    const dateInput = document.getElementById("startDate").value;

    if (!dateInput) {
        alert("Please select a date.");
        return;
    }

    const result = document.getElementById("result");
    result.innerHTML = "";

    const startDate = new Date(dateInput);

    // Day 0, 1, 2, 4, 7, 14, 30, 60
    const intervals = [0, 1, 2, 4, 7, 14, 30, 60];

    intervals.forEach(days => {

        const reviewDate = new Date(startDate);
        reviewDate.setDate(reviewDate.getDate() + days);

        const li = document.createElement("li");

        li.textContent =
            "Day " + days + ": " +
            reviewDate.getDate() + "/" +
            (reviewDate.getMonth() + 1) + "/" +
            reviewDate.getFullYear();

        result.appendChild(li);
    });
}
</script>

</body>
</html>
